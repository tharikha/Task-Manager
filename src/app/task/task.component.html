<div class="container">
  <h2>Task Manager</h2>

  <div class="input-section">
    <input [(ngModel)]="newTask" placeholder="Enter a task..." />
    <button (click)="addTask()">Add</button>
  </div>

   <ul>
    <li *ngFor="let task of tasks; trackBy:trackById">
      {{ task.title }}

      <div class="actions">
        <button class="edit" (click)="editTask(task)">✏️</button>
        <button class="delete" (click)="deleteTask(task.id)">🗑</button>
      </div>

    </li>
  </ul>
</div>
